{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 420px; margin: 60px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
    <div class="card-header" style="text-align: center; background: linear-gradient(135deg, #1e40af, #3b82f6); color: white;">
        <h1 style="margin: 0; font-size: 1.8rem;">🔐 Connexion</h1>
        <p style="margin: 8px 0 0; opacity: 0.9; font-size: 0.9rem;">Gestion du Personnel</p>
    </div>

    <div style="padding: 30px 28px;">
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group" style="margin-bottom: 18px;">
                <label for="username" style="font-weight: 600; display: block; margin-bottom: 6px;">Identifiant</label>
                <input type="text" id="username" name="username" class="form-control" 
                       placeholder="Votre identifiant" required autofocus
                       style="padding: 12px 14px; font-size: 1rem;">
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <label for="password" style="font-weight: 600; display: block; margin-bottom: 6px;">Mot de passe</label>
                <input type="password" id="password" name="password" class="form-control" 
                       placeholder="Votre mot de passe" required
                       style="padding: 12px 14px; font-size: 1rem;">
            </div>

            <button type="submit" class="btn btn-primary" 
                    style="width: 100%; padding: 14px; font-size: 1.05rem; font-weight: 600;">
                Se connecter
            </button>
        </form>

        <div style="margin-top: 22px; text-align: center; font-size: 0.85rem; color: #64748b;">
            <p style="margin: 0;">Compte de démonstration :</p>
            <strong style="color: #334155;">admin</strong> / <strong style="color: #334155;">admin123</strong>
        </div>
    </div>
</div>

<style>
    .form-control {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        transition: border-color 0.2s;
    }
    .form-control:focus {
        border-color: #3b82f6;
        outline: none;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
</style>
{% endblock %}
