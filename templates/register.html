{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 420px; margin: 40px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
    <div class="card-header" style="text-align: center; background: linear-gradient(135deg, #166534, #4ade80); color: white;">
        <h1 style="margin: 0; font-size: 1.8rem;">📝 Créer un compte</h1>
        <p style="margin: 8px 0 0; opacity: 0.9; font-size: 0.9rem;">Nouvel utilisateur</p>
    </div>

    <div style="padding: 30px 28px;">
        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group" style="margin-bottom: 18px;">
                <label for="username" style="font-weight: 600; display: block; margin-bottom: 6px;">Identifiant *</label>
                <input type="text" id="username" name="username" class="form-control" 
                       placeholder="Choisissez un identifiant" required autofocus
                       style="padding: 12px 14px; font-size: 1rem;">
            </div>

            <div class="form-group" style="margin-bottom: 18px;">
                <label for="password" style="font-weight: 600; display: block; margin-bottom: 6px;">Mot de passe *</label>
                <input type="password" id="password" name="password" class="form-control" 
                       placeholder="Choisissez un mot de passe" required minlength="6"
                       style="padding: 12px 14px; font-size: 1rem;">
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <label for="confirm_password" style="font-weight: 600; display: block; margin-bottom: 6px;">Confirmer le mot de passe *</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" 
                       placeholder="Confirmez le mot de passe" required
                       style="padding: 12px 14px; font-size: 1rem;">
            </div>

            <button type="submit" class="btn btn-primary" 
                    style="width: 100%; padding: 14px; font-size: 1.05rem; font-weight: 600; background: #166534;">
                Créer le compte
            </button>
        </form>

        <div style="margin-top: 22px; text-align: center; font-size: 0.9rem;">
            <a href="{{ url_for('login') }}" style="color: #166534; text-decoration: none;">
                ← Retour à la connexion
            </a>
        </div>
    </div>
</div>

<style>
    .form-control {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        transition: border-color 0.2s;
    }
    .form-control:focus {
        border-color: #166534;
        outline: none;
        box-shadow: 0 0 0 3px rgba(22, 101, 52, 0.1);
    }
</style>
{% endblock %}
