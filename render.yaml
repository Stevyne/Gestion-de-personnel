services:
  - type: web
    name: gestion-personnel
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gestion-personnel-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: gestion-personnel-db
    plan: free